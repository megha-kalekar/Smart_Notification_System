version: '3.9'

services:

  sqlserver:
    image: mcr.microsoft.com/mssql/server:2022-latest
    environment:
      SA_PASSWORD: "${DB_PASSWORD:-Dev@Strong123}"
      ACCEPT_EULA: "Y"
      MSSQL_PID: "Express"
    ports:
      - "1433:1433"
    volumes:
      - sqlserver_data:/var/opt/mssql
    healthcheck:
      test: ["CMD-SHELL", "/opt/mssql-tools18/bin/sqlcmd -S localhost -U sa -P \"${DB_PASSWORD:-Dev@Strong123}\" -Q \"SELECT 1\" -C || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 30s

  api:
    build:
      context: .
      dockerfile: Dockerfile
    ports:
      - "8080:8080"
    environment:
      ASPNETCORE_ENVIRONMENT: Production
      ConnectionStrings__DefaultConnection: "Server=sqlserver,1433;Database=SmartNotificationDb;User Id=sa;Password=${DB_PASSWORD:-Dev@Strong123};TrustServerCertificate=true;"
      Jwt__Key: "${JWT_KEY:-CHANGE_THIS_TO_A_STRONG_SECRET_KEY_MIN_32_CHARS}"
      Jwt__Issuer: "SmartNotificationSystem"
      Jwt__Audience: "SmartNotificationSystemUsers"
      Jwt__ExpiryMinutes: "15"
      Jwt__RefreshTokenExpiryDays: "7"
      NotificationWorker__IntervalSeconds: "5"
      NotificationWorker__MaxRetryCount: "3"
      RateLimit__PermitLimit: "100"
      RateLimit__WindowSeconds: "60"
    depends_on:
      sqlserver:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:8080/health || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 20s
    restart: unless-stopped

volumes:
  sqlserver_data:
